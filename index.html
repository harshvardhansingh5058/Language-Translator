<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Translator - Translate Instantly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="icon">🌐</span> Text Translator
                </h1>
                <p class="subtitle">Translate text instantly into 100+ languages</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="translator-container">
            <div class="translator-wrapper">
                <!-- Input Section -->
                <div class="section input-section">
                    <div class="section-header">
                        <label for="source-lang">Source Language</label>
                        <span class="char-count">0 / 5000</span>
                    </div>
                    
                    <div class="language-selector">
                        <select id="source-lang" class="language-select">
                            <option value="auto">Auto Detect</option>
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                            <option value="it">Italian</option>
                            <option value="pt">Portuguese</option>
                            <option value="ja">Japanese</option>
                            <option value="ko">Korean</option>
                            <option value="zh">Chinese (Simplified)</option>
                            <option value="ar">Arabic</option>
                            <option value="ru">Russian</option>
                            <option value="nl">Dutch</option>
                            <option value="tr">Turkish</option>
                            <option value="pl">Polish</option>
                            <option value="vi">Vietnamese</option>
                            <option value="th">Thai</option>
                            <option value="id">Indonesian</option>
                            <option value="uk">Ukrainian</option>
                            <option value="el">Greek</option>
                        </select>
                    </div>

                    <textarea
                        id="input-text"
                        class="textarea input-textarea"
                        placeholder="Enter text to translate... (Max 5000 characters)"
                        maxlength="5000"
                    ></textarea>

                    <div class="button-group">
                        <button id="clear-input" class="btn btn-secondary">Clear</button>
                    </div>
                </div>

                <!-- Output Section -->
                <div class="section output-section">
                    <div class="section-header">
                        <label for="target-lang">Target Language</label>
                    </div>
                    
                    <div class="language-selector">
                        <select id="target-lang" class="language-select">
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                            <option value="it">Italian</option>
                            <option value="pt">Portuguese</option>
                            <option value="ja">Japanese</option>
                            <option value="ko">Korean</option>
                            <option value="zh">Chinese (Simplified)</option>
                            <option value="ar">Arabic</option>
                            <option value="ru">Russian</option>
                            <option value="nl">Dutch</option>
                            <option value="tr">Turkish</option>
                            <option value="pl">Polish</option>
                            <option value="vi">Vietnamese</option>
                            <option value="th">Thai</option>
                            <option value="id">Indonesian</option>
                            <option value="uk">Ukrainian</option>
                            <option value="el">Greek</option>
                        </select>
                    </div>

                    <textarea
                        id="output-text"
                        class="textarea output-textarea"
                        placeholder="Translation will appear here..."
                        readonly
                    ></textarea>

                    <div class="button-group">
                        <button id="copy-btn" class="btn btn-secondary" disabled>
                            <span class="copy-icon">📋</span> Copy
                        </button>
                    </div>
                </div>

                <!-- Swap Button -->
                <div class="swap-container">
                    <button id="swap-btn" class="swap-btn" title="Swap languages">
                        <span class="swap-icon">⇅</span>
                    </button>
                </div>
            </div>

            <!-- Translate Button -->
            <div class="translate-btn-container">
                <button id="translate-btn" class="btn btn-primary">
                    <span class="btn-text">Translate</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </div>

            <!-- Status & Error Messages -->
            <div id="status-message" class="status-message hidden"></div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by <a href="https://libretranslate.de/" target="_blank" rel="noopener">LibreTranslate API</a></p>
            <p class="footer-note">Free, open-source translation. No API key required.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
